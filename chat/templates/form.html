<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />

</head>
<body>
  <div class="modal-backdrop">
    <div class="modal-window">
      <div class="modal-header">
        <h2>Налаштування</h2>
        <button class="modal-close" aria-label="Закрити">×</button>
      </div>

      <div class="modal-body">
        <div class="avatar-block">
          <div class="avatar-circle">AA</div>
          <div class="avatar-actions">
            <button type="button">Змінити</button>
            <button type="button">Видалити</button>
          </div>
        </div>

        <div class="field-group">
          <label>
            Ім’я
            <input type="text" value="Александра" />
          </label>

          <label>
            Прізвище
            <input type="text" value="Андрієвська" />
          </label>

          <label>
            Ім’я користувача
            <input type="text" value="@alexxxx" />
          </label>

          <label>
            Стать
            <select>
              <option>Жіноча</option>
              <option>Чоловіча</option>
            </select>
          </label>

          <label>
            Вік
            <input type="date" value="1995-04-14" />
          </label>
        </div>
      </div>

      <div class="footer">
        <button class="btn-secondary" type="button">Скасувати</button>
        <button class="btn-primary" type="button">Зберегти</button>
      </div>
    </div>
  </div>
</body>
</html>
